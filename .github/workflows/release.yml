name: Release

on:
  push:
    tags:
      - "v*.*.*"
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: false
        default: stable
        type: choice
        options:
          - stable
          - nightly
      version:
        description: "Stable version (example: 1.2.3 or v1.2.3)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  check_changes:
    name: Check for changes since last nightly
    if: github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: check
        name: Compare HEAD to last nightly tag
        run: |
          last_nightly_tag=$(git tag --list 'nightly-v*' --sort=-creatordate | head -n 1)
          if [[ -z "$last_nightly_tag" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          last_nightly_sha=$(git rev-parse "$last_nightly_tag^{commit}")
          head_sha=$(git rev-parse HEAD)

          if [[ "$last_nightly_sha" == "$head_sha" ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  preflight:
    name: Preflight
    needs: [check_changes]
    if: |
      !failure() && !cancelled() &&
      (github.event_name != 'schedule' || needs.check_changes.outputs.has_changes == 'true')
    runs-on: ubuntu-24.04
    outputs:
      release_channel: ${{ steps.meta.outputs.release_channel }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      make_latest: ${{ steps.meta.outputs.make_latest }}
      ref: ${{ steps.meta.outputs.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: meta
        name: Resolve release metadata
        shell: bash
        env:
          DISPATCH_CHANNEL: ${{ github.event.inputs.channel }}
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
          RUN_DATE: ${{ github.run_started_at }}
          RUN_NUMBER: ${{ github.run_number }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          is_nightly="false"
          if [[ "$EVENT_NAME" == "schedule" ]]; then
            is_nightly="true"
          elif [[ "$EVENT_NAME" == "workflow_dispatch" && "${DISPATCH_CHANNEL:-stable}" == "nightly" ]]; then
            is_nightly="true"
          fi

          if [[ "$is_nightly" == "true" ]]; then
            nightly_date=$(date -u -d "$RUN_DATE" +%Y%m%d)
            version="0.0.0-nightly.${nightly_date}.${RUN_NUMBER}"
            tag="nightly-v${version}"
            release_name="Jobseeker Nightly ${version}"

            echo "release_channel=nightly" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
            echo "ref=$tag" >> "$GITHUB_OUTPUT"
          else
            if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
              raw="${DISPATCH_VERSION:-}"
              if [[ -z "$raw" ]]; then
                echo "Stable workflow_dispatch requires a version input." >&2
                exit 1
              fi
            else
              raw="$REF_NAME"
            fi

            version="${raw#v}"
            if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
              echo "Invalid stable version: $raw" >&2
              exit 1
            fi

            tag="v$version"
            release_name="Jobseeker v$version"

            echo "release_channel=stable" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
            if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
              echo "make_latest=true" >> "$GITHUB_OUTPUT"
            else
              echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
              echo "make_latest=false" >> "$GITHUB_OUTPUT"
            fi
            echo "ref=$SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push nightly tag
        if: steps.meta.outputs.release_channel == 'nightly'
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

  build:
    name: Build ${{ matrix.label }}
    needs: preflight
    if: ${{ !failure() && !cancelled() && needs.preflight.result == 'success' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-14
            dist_command: dist:desktop:dmg:arm64
          - label: macOS x64
            runner: macos-13
            dist_command: dist:desktop:dmg:x64
          - label: Linux x64
            runner: ubuntu-24.04
            dist_command: dist:desktop:linux
          - label: Windows x64
            runner: windows-2025
            dist_command: dist:desktop:win:x64
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set desktop package version
        run: node scripts/set-desktop-version.mjs "${{ needs.preflight.outputs.version }}"

      - name: Build distributable
        run: bun run ${{ matrix.dist_command }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip
            apps/desktop/dist/*.AppImage
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.blockmap
            apps/desktop/dist/*.yml

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-24.04
    needs: [preflight, build]
    if: ${{ !failure() && !cancelled() && needs.preflight.result == 'success' && needs.build.result == 'success' }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          name: ${{ needs.preflight.outputs.release_name }}
          prerelease: ${{ needs.preflight.outputs.is_prerelease == 'true' }}
          make_latest: ${{ needs.preflight.outputs.make_latest == 'true' }}
          files: release-assets/**
          generate_release_notes: true
